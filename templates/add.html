<!DOCTYPE html>
<html>
<head>
    <title>Add Item</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .form-container {
            max-width: 500px;
            background: rgba(30, 41, 59, 0.7);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid #1e293b;
            margin-top: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; color: #94a3b8; font-size: 14px; font-weight: 600; }
        .form-group input { width: 100%; box-sizing: border-box; padding: 12px; font-size: 15px; }
        
        .pass-group { position: relative; display: flex; align-items: center; }
        .pass-group input { padding-right: 50px; }
        .gen-trigger {
            position: absolute;
            right: 5px;
            background: #3b82f6;
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
        }

        /* Modal / Popup Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #1e293b;
            padding: 25px;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            border: 1px solid #3b82f6;
            text-align: center;
        }
        .gen-display {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .gen-display input {
            flex-grow: 1;
            background: #0f172a;
            border: 1px solid #334155;
            color: #4ade80;
            font-family: monospace;
            font-size: 18px;
            text-align: center;
        }
        .slider-box { margin: 20px 0; }
        .slider-box input { width: 100%; cursor: pointer; }
        .checkbox-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            text-align: left;
            margin-bottom: 20px;
        }
        .checkbox-grid label { font-size: 14px; color: #cbd5e1; display: flex; align-items: center; gap: 8px; }
        .checkbox-grid input { width: auto; margin: 0; }
    </style>
</head>
<body>

<div class="sidebar">
    <a href="/dashboard">Dashboard</a>
    <a href="/add">Add</a>
    <a href="/generate">Generator</a>
    <a href="/settings">Settings</a>
    <a href="/logout" style="color: #f87171; margin-top: 50px;">Logout</a>
</div>

<div class="main">
    <h2>Add New Vault Item</h2>

    <div class="form-container">
        <form method="POST">
            <div class="form-group">
                <label>Item Name</label>
                <input name="name" placeholder="e.g. Google, Netflix, Work Email" required>
            </div>

            <div class="form-group">
                <label>Website URL</label>
                <input name="url" placeholder="https://www.example.com">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="example@mail.com">
            </div>

            <div class="form-group">
                <label>Username</label>
                <input name="username" placeholder="Username">
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="pass-group">
                    <input name="password" id="main-pass" type="text" placeholder="Password" required>
                    <button type="button" class="gen-trigger" onclick="openPopup()">⚡</button>
                </div>
            </div>

            <button type="submit" style="width: 100%; margin-top: 10px; padding: 15px; font-weight: bold;">SAVE TO VAULT</button>
        </form>
    </div>
</div>

<!-- Password Generator Popup -->
<div id="gen-modal" class="modal-overlay">
    <div class="modal-content">
        <h3>Password Generator</h3>
        
        <div class="gen-display">
            <input id="gen-result" readonly>
            <button onclick="copyGenerated()">Copy</button>
        </div>

        <div class="slider-box">
            <label>Length: <b id="len-val">14</b></label>
            <input type="range" id="gen-length" min="5" max="128" value="14" oninput="updateLen(this.value)">
        </div>

        <div class="checkbox-grid">
            <label><input type="checkbox" id="gen-upper"> A-Z (Uppercase)</label>
            <label><input type="checkbox" id="gen-lower" checked> a-z (Lowercase)</label>
            <label><input type="checkbox" id="gen-numbers"> 0-9 (Numbers)</label>
            <label><input type="checkbox" id="gen-symbols"> !@#$% (Symbols)</label>
        </div>

        <div style="display: flex; gap: 10px;">
            <button onclick="generateInPopup()" style="flex: 1; background: #3b82f6;">Generate</button>
            <button onclick="applyPassword()" style="flex: 1; background: #22c55e;">Apply</button>
            <button onclick="closePopup()" style="flex: 1; background: #64748b;">Cancel</button>
        </div>
    </div>
</div>

<script>
function openPopup() {
    document.getElementById('gen-modal').style.display = 'flex';
    generateInPopup(); // Generate initial default
}

function closePopup() {
    document.getElementById('gen-modal').style.display = 'none';
}

function updateLen(val) {
    document.getElementById('len-val').innerText = val;
}

function generateInPopup() {
    const length = parseInt(document.getElementById('gen-length').value);
    const useUpper = document.getElementById('gen-upper').checked;
    const useLower = document.getElementById('gen-lower').checked;
    const useNumbers = document.getElementById('gen-numbers').checked;
    const useSymbols = document.getElementById('gen-symbols').checked;

    let charset = "";
    if (useUpper) charset += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    if (useLower) charset += "abcdefghijklmnopqrstuvwxyz";
    if (useNumbers) charset += "0123456789";
    if (useSymbols) charset += "!@#$%^&*()_+~`|}{[]:;?><,./-=";

    if (charset === "") charset = "abcdefghijklmnopqrstuvwxyz"; // Fallback

    let password = "";
    for (let i = 0; i < length; i++) {
        password += charset.charAt(Math.floor(Math.random() * charset.length));
    }
    document.getElementById('gen-result').value = password;
}

function copyGenerated() {
    const pass = document.getElementById('gen-result').value;
    navigator.clipboard.writeText(pass);
    alert("Password copied to clipboard!");
}

function applyPassword() {
    document.getElementById('main-pass').value = document.getElementById('gen-result').value;
    closePopup();
}
</script>

</body>
</html>
