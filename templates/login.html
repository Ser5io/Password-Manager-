<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .requirement { color: #f87171; font-size: 13px; margin: 2px 0; transition: 0.3s; }
        .requirement.valid { color: #4ade80; }
        .msg { padding: 10px; border-radius: 8px; margin-bottom: 15px; text-align: center; }
        .error-msg { color: #f87171; background: rgba(248, 113, 113, 0.1); border: 1px solid #f87171; }
        .success-msg { color: #4ade80; background: rgba(74, 222, 128, 0.1); border: 1px solid #4ade80; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="main" style="max-width: 400px; margin: 100px auto; text-align: center; margin-left: auto;">
    <h2>Password Manager</h2>

    <!-- Alert Messages -->
    {% if error %}
    <div class="msg error-msg">{{ error }}</div>
    {% endif %}
    {% if success %}
    <div class="msg success-msg">{{ success }}</div>
    {% endif %}

    <div style="margin-bottom: 20px;">
        <button onclick="show('login')" style="background: none; border: 1px solid #3b82f6;">Login</button>
        <button onclick="show('register')" style="background: none; border: 1px solid #3b82f6;">Register</button>
    </div>

    <!-- Login Form -->
    <div id="login-view" class="{{ 'hidden' if view == 'register' else '' }}">
        <form method="POST" action="/">
            <input type="email" name="email" placeholder="Email" required style="width: 90%;">
            <input type="password" name="password" placeholder="Password" required style="width: 90%;">
            <button type="submit" style="width: 96%; margin-top: 15px;">Login</button>
        </form>
    </div>

    <!-- Register Form -->
    <div id="register-view" class="{{ '' if view == 'register' else 'hidden' }}">
        <form method="POST" action="/register">
            <input type="email" name="email" placeholder="Email" required style="width: 90%;">
            <input id="pass" type="password" name="password" placeholder="Master Password" required style="width: 90%;">

            <div id="requirements-box" style="text-align: left; margin: 15px 0 0 20px;">
                <div id="req-len" class="requirement">● At least 8 characters</div>
                <div id="req-upper" class="requirement">● One uppercase letter (A-Z)</div>
                <div id="req-lower" class="requirement">● One lowercase letter (a-z)</div>
                <div id="req-digit" class="requirement">● One digit (0-9)</div>
                <div id="req-symbol" class="requirement">● One symbol (!@#$%...)</div>
            </div>

            <button id="reg-btn" disabled style="width: 96%; margin-top: 20px; opacity: 0.5; cursor: not-allowed;">Register</button>
        </form>
    </div>
</div>

<script>
function show(x){
    if(x === 'login') {
        document.getElementById("login-view").classList.remove("hidden");
        document.getElementById("register-view").classList.add("hidden");
    } else {
        document.getElementById("login-view").classList.add("hidden");
        document.getElementById("register-view").classList.remove("hidden");
    }
}

document.getElementById("pass").addEventListener("input", function(){
    let v = this.value;

    let checks = {
        "req-len": v.length >= 8,
        "req-upper": /[A-Z]/.test(v),
        "req-lower": /[a-z]/.test(v),
        "req-digit": /[0-9]/.test(v),
        "req-symbol": /[^A-Za-z0-9]/.test(v)
    };

    let allValid = true;
    for (let id in checks) {
        let el = document.getElementById(id);
        if (checks[id]) {
            el.classList.add("valid");
        } else {
            el.classList.remove("valid");
            allValid = false;
        }
    }

    let btn = document.getElementById("reg-btn");
    btn.disabled = !allValid;
    btn.style.opacity = allValid ? "1" : "0.5";
    btn.style.cursor = allValid ? "pointer" : "not-allowed";
});
</script>

</body>
</html>
